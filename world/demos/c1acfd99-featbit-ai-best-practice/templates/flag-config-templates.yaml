# FeatBit AI 应用 Feature Flag 配置模板
# 使用说明：复制需要的配置到 FeatBit 控制台创建对应的 Feature Flag

# =============================================================================
# 场景一：AI 模型安全发布
# =============================================================================

- flag_key: ai-model-v2-enabled
  name: "AI Model V2 Enabled"
  description: "控制是否启用新版 AI 模型，用于灰度发布"
  type: boolean
  variations:
    - value: true
      name: "启用新版模型"
    - value: false
      name: "使用旧版模型"
  targeting:
    - name: "内部测试用户"
      conditions:
        - property: "email"
          op: "endsWith"
          value: "@company.com"
      variation: true
    - name: "Beta 用户"
      conditions:
        - property: "user_segment"
          op: "isOneOf"
          value: ["beta-users", "early-adopters"]
      variation: true
  percentage_rollout:
    - variation: true
      percentage: 5  # 初始只开放 5%
    - variation: false
      percentage: 95
  default_variation: false

# =============================================================================
# 场景二：AI 功能 A/B 测试
# =============================================================================

- flag_key: ai-summary-strategy
  name: "AI Summary Strategy"
  description: "A/B 测试不同的 AI 摘要生成策略"
  type: string
  variations:
    - value: "gpt4-concise"
      name: "GPT-4 简洁"
    - value: "gpt4-detailed"
      name: "GPT-4 详细"
    - value: "claude3-concise"
      name: "Claude-3 简洁"
  percentage_rollout:
    - variation: "gpt4-concise"
      percentage: 33.3
    - variation: "gpt4-detailed"
      percentage: 33.3
    - variation: "claude3-concise"
      percentage: 33.4
  default_variation: "gpt4-concise"

- flag_key: ai-response-temperature
  name: "AI Response Temperature"
  description: "A/B 测试不同的 AI 响应温度参数"
  type: number
  variations:
    - value: 0.3
      name: "保守 (0.3)"
    - value: 0.7
      name: "平衡 (0.7)"
    - value: 1.0
      name: "创造性 (1.0)"
  percentage_rollout:
    - variation: 0.3
      percentage: 33.3
    - variation: 0.7
      percentage: 33.3
    - variation: 1.0
      percentage: 33.4
  default_variation: 0.7

# =============================================================================
# 场景三：AI 功能远程配置
# =============================================================================

- flag_key: ai-config
  name: "AI Configuration"
  description: "AI 服务的动态配置参数"
  type: json
  variations:
    - value:
        name: "production"
        value: |
          {
            "model": "gpt-4-turbo",
            "temperature": 0.7,
            "max_tokens": 2000,
            "system_prompt": "You are a helpful AI assistant.",
            "fallback_model": "gpt-3.5-turbo",
            "rate_limit_per_user": 100,
            "cost_alert_threshold": 0.05,
            "enable_streaming": true,
            "safety_filters": ["hate_speech", "violence", "self_harm"]
          }
    - value:
        name: "development"
        value: |
          {
            "model": "gpt-3.5-turbo",
            "temperature": 0.9,
            "max_tokens": 500,
            "system_prompt": "You are a test AI assistant.",
            "fallback_model": "gpt-3.5-turbo",
            "rate_limit_per_user": 1000,
            "cost_alert_threshold": 0.01,
            "enable_streaming": true,
            "safety_filters": []
          }
    - value:
        name: "cost-saving"
        value: |
          {
            "model": "gpt-3.5-turbo",
            "temperature": 0.5,
            "max_tokens": 500,
            "system_prompt": "Provide brief, accurate responses.",
            "fallback_model": "gpt-3.5-turbo",
            "rate_limit_per_user": 50,
            "cost_alert_threshold": 0.02,
            "enable_streaming": false,
            "safety_filters": ["hate_speech", "violence"]
          }
  targeting:
    - name: "生产环境"
      conditions:
        - property: "environment"
          op: "eq"
          value: "production"
      variation: "production"
    - name: "开发环境"
      conditions:
        - property: "environment"
          op: "eq"
          value: "development"
      variation: "development"
    - name: "成本优化模式"
      conditions:
        - property: "cost_mode"
          op: "eq"
          value: "saving"
      variation: "cost-saving"
  default_variation: "production"

# =============================================================================
# 场景四：AI 应用权限管理
# =============================================================================

- flag_key: ai-writing-basic
  name: "AI Writing Basic"
  description: "基础 AI 写作功能开关"
  type: boolean
  variations:
    - value: true
      name: "启用"
    - value: false
      name: "禁用"
  default_variation: true  # 所有用户默认启用

- flag_key: ai-writing-advanced
  name: "AI Writing Advanced"
  description: "高级 AI 写作功能 - Pro 及以上用户"
  type: boolean
  variations:
    - value: true
      name: "启用"
    - value: false
      name: "禁用"
  targeting:
    - name: "Pro 用户"
      conditions:
        - property: "subscription_tier"
          op: "isOneOf"
          value: ["pro", "enterprise"]
      variation: true
  default_variation: false

- flag_key: ai-summary
  name: "AI Summary"
  description: "AI 摘要生成功能 - Pro 及以上用户"
  type: boolean
  variations:
    - value: true
      name: "启用"
    - value: false
      name: "禁用"
  targeting:
    - name: "Pro 用户"
      conditions:
        - property: "subscription_tier"
          op: "isOneOf"
          value: ["pro", "enterprise"]
      variation: true
  default_variation: false

- flag_key: ai-custom-model
  name: "AI Custom Model"
  description: "自定义 AI 模型功能 - 仅 Enterprise 用户"
  type: boolean
  variations:
    - value: true
      name: "启用"
    - value: false
      name: "禁用"
  targeting:
    - name: "Enterprise 用户"
      conditions:
        - property: "subscription_tier"
          op: "eq"
          value: "enterprise"
      variation: true
  default_variation: false

- flag_key: ai-usage-limits
  name: "AI Usage Limits"
  description: "基于订阅等级的 AI 使用限制"
  type: json
  variations:
    - value:
        name: "free"
        value: |
          {
            "daily_limit": 10,
            "monthly_limit": 200,
            "features": ["basic"],
            "models": ["gpt-3.5-turbo"]
          }
    - value:
        name: "pro"
        value: |
          {
            "daily_limit": 100,
            "monthly_limit": 2000,
            "features": ["basic", "advanced", "summary"],
            "models": ["gpt-3.5-turbo", "gpt-4-turbo"]
          }
    - value:
        name: "enterprise"
        value: |
          {
            "daily_limit": -1,
            "monthly_limit": -1,
            "features": ["basic", "advanced", "summary", "custom"],
            "models": ["gpt-3.5-turbo", "gpt-4-turbo", "claude-3", "custom"]
          }
  targeting:
    - name: "Free 用户"
      conditions:
        - property: "subscription_tier"
          op: "eq"
          value: "free"
      variation: "free"
    - name: "Pro 用户"
      conditions:
        - property: "subscription_tier"
          op: "eq"
          value: "pro"
      variation: "pro"
    - name: "Enterprise 用户"
      conditions:
        - property: "subscription_tier"
          op: "eq"
          value: "enterprise"
      variation: "enterprise"
  default_variation: "free"

# =============================================================================
# 通用 Flag Triggers 配置
# =============================================================================

triggers:
  - name: "high-error-rate-rollback"
    description: "错误率过高时自动回滚"
    flag_key: "ai-model-v2-enabled"
    condition: "error_rate > 5% for 5 minutes"
    action: "set_variation"
    target_variation: false
    notify:
      - type: "slack"
        channel: "#ai-alerts"
      - type: "pagerduty"
        service_key: "${PAGERDUTY_SERVICE_KEY}"

  - name: "cost-threshold-alert"
    description: "AI 成本超过阈值时告警"
    flag_key: "ai-config"
    condition: "hourly_cost > $100"
    action: "notify"
    notify:
      - type: "slack"
        channel: "#ai-cost-alerts"
      - type: "email"
        recipients: ["ai-team@company.com"]

# =============================================================================
# Scheduled Changes 配置
# =============================================================================

scheduled_changes:
  - name: "gradual-rollout-phase-2"
    description: "灰度发布第二阶段 - 扩展到 20%"
    flag_key: "ai-model-v2-enabled"
    scheduled_at: "2026-03-15T10:00:00Z"
    changes:
      - type: "update_percentage"
        variation: true
        new_percentage: 20

  - name: "weekend-cost-saving-mode"
    description: "周末自动切换到成本优化模式"
    flag_key: "ai-config"
    schedule:
      cron: "0 0 * * 6"  # 每周六 0:00
    changes:
      - type: "set_targeting"
        conditions:
          - property: "time_period"
            op: "eq"
            value: "weekend"
        variation: "cost-saving"

  - name: "weekday-normal-mode"
    description: "工作日恢复生产配置"
    flag_key: "ai-config"
    schedule:
      cron: "0 0 * * 1"  # 每周一 0:00
    changes:
      - type: "remove_targeting"
        condition_name: "weekend-mode"
